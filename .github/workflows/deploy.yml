# we have to just push the code after changes the further steps will be done by github see 
# once the changes is pushed the github performs action # i.e script is executed which performs the remainind steps
name: deploy to ec2
on:
   push:
     branches:
        - main

jobs:
   deploy:
      runs-on: ubuntu-latest
    #   craete a new vm

      steps:
       - name: checkout code
    #    to store the code in new virtual machine
         uses: actions/checkout@v6
       - name: deploy via ssh
         uses: appleboy/ssh-action@v1
         with:
           host: ${{secrets.SSH_HOST}}
           username: ubuntu
           key: ${{secrets.SSH_KEY}}
           script: |
             cd ~/AWS
             git pull
             sudo docker compose down
             sudo docker compose up -d --build